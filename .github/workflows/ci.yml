name: CI/CD Pipeline VitalSync

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - main

jobs:

  # ===============================
  # Étape 1 – Lint & Tests
  # ===============================
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        working-directory: ./backend
        run: npm install

      - name: Run tests (Jest)
        working-directory: ./backend
        run: npm test

  # ===============================
  # Étape 2 – Build Docker
  # ===============================
  build:
    runs-on: ubuntu-latest
    needs: test   # dépend de l’étape test

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build backend image
        run: docker build -t vitalsync-backend ./backend

      - name: Build frontend image
        run: docker build -t vitalsync-frontend ./frontend

  # ===============================
  # Étape 3 – Déploiement staging
  # ===============================
  deploy:
    runs-on: ubuntu-latest
    needs: build   # dépend du build

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Start services with docker-compose
        run: docker-compose up -d --build

      # Attendre que les services démarrent
      - name: Wait for services
        run: sleep 10

      # Health check du backend
      - name: Health check API
        run: |
          curl --fail http://localhost:3000/health || exit 1

      # Optionnel : afficher logs si erreur
      - name: Show logs if failure
        if: failure()
        run: docker-compose logs